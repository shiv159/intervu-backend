spring.application.name=intervu
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/intervu}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:intervu}
spring.datasource.password=${POSTGRES_PASSWORD:intervu}
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.initialization-fail-timeout=${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:-1}

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

openrouter.url=https://openrouter.ai/api/v1/chat/completions
openrouter.api.key=${OPENROUTER_API_KEY:mock_key_for_build}
openrouter.model=${OPENROUTER_MODEL:google/gemini-2.5-flash}

# JWT — secret MUST be set via env var in production
intervu.jwt.secret=${INTERVU_JWT_SECRET:}

# CORS — comma-separated origins, defaults to Angular dev server
intervu.cors.allowed-origins=${INTERVU_CORS_ALLOWED_ORIGINS:http://localhost:4200}
